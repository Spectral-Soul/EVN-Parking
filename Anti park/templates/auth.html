<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVNPARK | Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#3b82f6' }}}}
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-[#020617] text-white font-[Inter] h-screen flex items-center justify-center p-4 overflow-hidden relative selection:bg-indigo-500/30">
    
    <!-- Background Decor -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md glass p-8 rounded-3xl relative z-10 border border-white/10 shadow-2xl hover-scale">
        <div class="flex justify-center mb-8">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg anim-neon-blue">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
        </div>
        
        <h2 class="text-3xl font-bold text-center mb-2 tracking-tight">Welcome to EVNPARK</h2>
        <p class="text-center text-slate-400 mb-8 text-sm">Smart navigation. Effortless parking.</p>

        <form id="auth-form" class="space-y-5" onsubmit="handleAuth(event)">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                <div class="relative">
                    <input type="text" id="username" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 pl-10 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-slate-500" placeholder="johndoe" required>
                    <svg class="w-5 h-5 text-slate-500 absolute left-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                <div class="relative">
                    <input type="password" id="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 pl-10 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-slate-500" placeholder="••••••••" required>
                    <svg class="w-5 h-5 text-slate-500 absolute left-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-medium py-3 rounded-xl shadow-lg transition-all focus:outline-none hover:shadow-indigo-500/25 active:scale-95">
                Login
            </button>
        </form>

        <p class="text-center text-sm text-slate-400 mt-6">
            <span id="toggle-text">Don't have an account?</span> 
            <button onclick="toggleMode()" class="text-indigo-400 hover:text-indigo-300 font-medium ml-1">Register</button>
        </p>
        
        <div id="error-msg" class="text-red-400 text-sm text-center mt-4 hidden"></div>
    </div>

    <script>
        let isLogin = true;
        
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('submit-btn').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('error-msg').classList.add('hidden');
        }

        async function handleAuth(e) {
            e.preventDefault();
            const url = isLogin ? '/auth/login' : '/auth/register';
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if(res.ok) {
                    if(!isLogin) {
                        alert('Registered successfully. Please login.');
                        toggleMode();
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    errorDiv.innerText = data.error;
                    errorDiv.classList.remove('hidden');
                }
            } catch(e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
